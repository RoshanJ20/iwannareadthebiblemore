name: iwannareadthebiblemore
description: Gamified Bible reading app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Firebase — FlutterFire v3.x (requires Dart 3, firebase_options.dart from flutterfire configure)
  # Bumped from plan's v2.x because firebase_auth_mocks ^0.14.1 requires firebase_core ^3.x
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_remote_config: ^5.0.0
  cloud_functions: ^5.0.0  # for callable Cloud Functions (nudge, xpStorePurchase, onUserLeaveGroup)

  # Auth providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Local storage
  hive_flutter: ^1.1.0

  # Animations
  lottie: ^3.1.0

  # Utilities
  share_plus: ^9.0.0
  intl: ^0.19.0
  home_widget: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/bible/
    - assets/images/
